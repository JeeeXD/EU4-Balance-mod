############ MODIFIERS ##############

############### MISSIONS ###########
ava_conquer_prome_title: "Loyal Vassals"
ava_conquer_prome_desc: "The path to a great empire begins with a small victory. With the defeat of our immediate rivals we show ourselves to be a contender for glory."
ava_conquer_ava_title: "The South Kneels"
ava_conquer_ava_desc: "The Ava Kingdom pretends that it continues the legacy of Pagan through their loose hegemony over the Shan Saophas. We must cease our tribute to Ava and take up the mantle of Pagan ourselves."
ava_conquer_kachin_title: "Green of Kale"
ava_conquer_kachin_desc: "Kale have proven themselves to be loyal and valuable subjects providing us with various green legumes as food for our people. They will be greatly rewarded by gaining control of the lands to the north."
ava_conquer_shan_title: "Integrate the Shan"
ava_conquer_shan_desc: "When the Mongols laid waste to the Pagan Kingdom of old, the Shan Saophas filled the power vacuum. Uncivilized and unworthy to rule even their rugged hills, their grasp over Burma must be put to an end."
ava_pacify_shan_title: "Unity of the State"
ava_pacify_shan_desc: "Though the Saophas of the Shan Mongs at least nominally accept our rule, they will be an ever-present danger unless we break their power completely."
ava_conquer_lxa_title: "A Million Elephants"
ava_conquer_lxa_desc: "Though perhaps an exaggerated statistic, it is said that the Lan Xang is home to a million elephants. We should invade the lands of the Lao, capture these elephants, and outfit them for war."
ava_universal_ruler_title: "First Burmese Empire"
ava_universal_ruler_desc: "Burma has been disunited and weak since the fall of the Pagan Kingdom. Order must be restored, and a new empire must rise to replace the old."
ava_conquer_lanna_title: "A Million Rice Fields"
ava_conquer_lanna_desc: "The Kingdom of Lan Na names itself the Land of a Million Rice Fields. A proud boast, and not inaccurate; their granaries will fill the bellies of our soldiers."
ava_conquer_siam_title: "Conquer Siam"
ava_conquer_siam_desc: "The rulers of Siam command vast armies with many trained war elephants. We must be prepared before striking against such a formidable enemy, but strike we must."
ava_rule_indochina_title: "Chakravarti"
ava_rule_indochina_desc: "Though our monarchs formally claim the title of Chakravarti, or Universal Ruler, our proclamation will ring hollow until we rule all of Indochina."
ava_conquer_pegu_title: "Conquer Lower Burma"
ava_conquer_pegu_desc: "Great empires begin with daring feats of martial ambition. The Mon kingdom can command an impressive army, yet it is weakened by frequent raids by foreign powers. If we attack at an opportune moment, we could annex Lower Burma and begin our conquest of all Burma."
ava_build_palace_title: "Move Capital to Pegu"
ava_build_palace_desc: "Pegu would make an ideal capital for our new empire. We should move the court to the city and and begin a project of development and relocation, marking this new era for the city with the Kanbawzathadi Palace."
ava_conquer_arakan_title: "Invade Arakan"
ava_conquer_arakan_desc: "The Sultan of Arakan believes himself safe behind the mountains as he sponsors pirates and smugglers to steal the wealth of the Bay of Bengal. We will show him that the mountains are no obstacle to us."
ava_restore_pagodas_title: "Restore Pagodas"
ava_restore_pagodas_desc: "In former decades of conflict and scarcity, it has been difficult for rulers to properly maintain the great pagodas that dot the Burmese landscape. As we restore these structures we also restore the faith of the Sangha in our rule."
ava_protect_lankan_buddhism_title: "Protect Lankan Buddhism"
ava_protect_lankan_buddhism_desc: "Lanka is the heart of Theravada Buddhism. Its shrines protect sacred relics such as the Tooth of the Buddha, it is the last refuge of Pali literature, and a vital source of monastic consecration. It cannot be allowed to fall into heathen hands."
ava_conquer_manipur_title: "End Manipuri Raids"
ava_conquer_manipur_desc: "Jungles and mountains obstruct the path to Manipur, though these obstacles have given Manipuri raiders little pause. We must cross this harsh terrain and put an end to the indiscriminate looting of Burma."
ava_conquer_bengal_title: "Conquer Bengal"
ava_conquer_bengal_desc: "No Burmese kingdom has ever expanded its domain into Bengal. We shall be the first."
ava_great_mandala_title: "A Great Mandala"
ava_great_mandala_desc: "A great emperor must be the center of the universe. Mighty kings must bow before him and worship the ground he walks upon."
ava_great_mandala.tooltip: "Any non-tributary subject country has at least §Y15§! total Development and less than §Y5§! Liberty Desire."
gen_north_india_powerful_subject.tooltip: "Any non-tributary subject country has at least §Y5§! total Development and less than §Y5§! Liberty Desire"
ava_dragon_throne_title: "Seize the Dragon Throne"
ava_dragon_throne_desc: "We shall be the greatest empire the world has ever seen. Even mighty China shall know our rule. We must seize the Dragon Throne and proclaim a new imperial dynasty."
ava_dragon_throne_fake_mandate: "Gain §G10.00§! Mandate."

############ IDEAS ###############
BRM_ideas: "Burmese Ideas"
BRM_ideas_start: "Burmese Traditions"
BRM_ideas_bonus: "Burmese Ambition"

BRM_legacy_of_the_pagan_dynasty: "Legacy of the Pagan Dynasty"
BRM_legacy_of_the_pagan_dynasty_desc: "The Pagan kings laid the foundation of Burmese civilization, a realm bound by Theravada Buddhism, great pagodas, and royal might. Their legacy endures, guiding our kings to rule with wisdom and devotion."

BRM_rajadhiraja: "Rajadhiraja – King of Kings"
BRM_rajadhiraja_desc: "As heirs to the ancient monarchs of the Irrawaddy Valley, our kings claim the title ‘Rajadhiraja’ — ruler of rulers. Such divine authority commands the loyalty of men and magnifies our power."

BRM_manu_kye_dhammathat: "The Manu Kye Dhammathat"
BRM_manu_kye_dhammathat_desc: "Our realm is governed by the *Dhammathat*, the sacred code of law blending Buddhist ethics and royal decree. Justice strengthens the throne, and prosperity flows from righteousness."

BRM_bamar_literature: "Flourishing of Bamar Literature"
BRM_bamar_literature_desc: "Poets, monks, and scholars have long enriched the Burmese tongue with chronicles and verse. Their works immortalize our triumphs and ensure that wisdom and culture thrive across the kingdom."

BRM_hill_tribes: "The Hill Tribes of the Frontier"
BRM_hill_tribes_desc: "From the Chin hills to the Shan highlands, the frontier peoples are fierce and loyal when respected. Through diplomacy and shared purpose, we draw their strength into our armies."

BRM_shan_in_line: "The Shan Brought to Heel"
BRM_shan_in_line_desc: "Once a constant thorn in the side of kings, the Shan states have been subdued and brought into the fold. Their warriors now march beneath our banner, adding their might to our legions."

BRM_provincial_governors: "System of Provincial Governors"
BRM_provincial_governors_desc: "To rule such vast lands, we empower governors loyal to the crown. Their watchful administration keeps order, curbs corruption, and ensures the King’s will is carried to every province."

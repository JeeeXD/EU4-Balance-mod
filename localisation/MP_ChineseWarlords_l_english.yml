YUE_ideas: "Yue Ideas"
YUE_ideas_start: "Yue Traditions"
YUE_ideas_bonus: "Yue Ambition"

YUE_1: "Masters of the Southern Seas"
YUE_1_desc: "The merchants of Yue have long ruled the waves of the South China Sea. From Guangzhou to Hainan, our shipyards and harbors bustle with fleets ready for war and trade alike."

YUE_2: "Harmony of the Estates"
YUE_2_desc: "In times of chaos, even warlords must govern wisely. By balancing the interests of scholars, merchants, and soldiers, we ensure a stable and prosperous realm."

YUE_3: "The Southern Trade Winds"
YUE_3_desc: "Trade flows like monsoon currents. Our sailors know the patterns of the ocean, carrying Yue’s influence far beyond the horizon."

YUE_4: "Merit in Service"
YUE_4_desc: "A ruler’s wisdom is found in those he surrounds himself with. By rewarding skill and loyalty, we draw the brightest minds into our court."

YUE_5: "Sons of the Ocean"
YUE_5_desc: "Our people are born with salt in their veins. We shall expand beyond the coast, claiming new lands under the banner of Yue."

YUE_6: "Shipyards of the South"
YUE_6_desc: "The shipwrights of Yue craft vessels of remarkable endurance and strength. Even in distant seas, our fleets can recover and fight on."

YUE_7: "Thunders of the Dragon Cannon"
YUE_7_desc: "Our artillery roars like dragons, shaking the earth and crushing our foes. With innovation and determination, we bring southern firepower to every battlefield."

WUU_ideas: "Wu Ideas"
WUU_ideas_start: "Wu Traditions"
WUU_ideas_bonus: "Wu Ambition"

WUU_1: "Cities of the Lower Yangtze"
WUU_1_desc: "The cities of Suzhou, Hangzhou, and Nanjing are marvels of wealth and order. Their administrators ensure prosperity flows as smoothly as the canals that bind them."

WUU_2: "Doctrine of Tolerance"
WUU_2_desc: "Wu is a land of many faiths and philosophies — where Confucian, Buddhist, and Daoist teachings coexist. Tolerance brings peace, and peace brings strength."

WUU_3: "Engineers of the Delta"
WUU_3_desc: "Our people have reclaimed land from rivers and built cities upon them. Such mastery of the land translates into unmatched skill in development and administration."

WUU_4: "Steel and Spirit"
WUU_4_desc: "Wu’s armies are trained with precision and pride. Their unwavering morale reflects both discipline and the prosperity they defend."

WUU_5: "Harmony in Doctrine"
WUU_5_desc: "Through harmonization of beliefs and reforms, Wu becomes more than a region — it is a philosophy of order, resilience, and progress."

WUU_6: "Strength of the True Faith"
WUU_6_desc: "The faithful fight with unmatched resolve. Our soldiers draw courage from conviction, ensuring victory for our cause."

WUU_7: "Masters of Command"
WUU_7_desc: "Leadership is an art perfected in the courts and academies of Wu. Our generals lead with intellect and vision, turning discipline into triumph."

CXI_ideas: "Xi Ideas"
CXI_ideas_start: "Xi Traditions"
CXI_ideas_bonus: "Xi Ambition"

CXI_1: "Caravans of the West"
CXI_1_desc: "Through the mountain passes flow caravans laden with silk, tea, and jade. Trade and stability sustain our frontier strongholds."

CXI_2: "Law of the Land"
CXI_2_desc: "A just ruler brings order even to chaos. By codifying governance and rewarding loyalty, we ensure peace within our borders."

CXI_3: "Shield of the Mountains"
CXI_3_desc: "The rugged terrain of Sichuan and Yunnan breeds resilience. Our troops, trained in mountain warfare, can withstand even the fiercest assaults."

CXI_4: "Mandate of Respect"
CXI_4_desc: "Through measured rule and honor, we win respect both within and beyond our borders. Prestige is as vital a weapon as the sword."

CXI_5: "Riches of the Earth"
CXI_5_desc: "From the mines to the markets, the wealth of Xi flows outward. Our artisans and traders bring prosperity to every province under our control."

CXI_6: "The King’s Discipline"
CXI_6_desc: "Every army needs order. Our soldiers fight as one, their discipline reflecting the unity of our rule."

CXI_7: "Tribute of the Realm"
CXI_7_desc: "The lords and tribes of our domain offer tribute not out of fear, but out of respect. Their loyalty fuels our power and sustains the stability of the state."

mnd_khm_infiltrate_burma_title: "Infiltrate Burma"
mnd_khm_infiltrate_burma_desc: "Our envoys and spies must slip into the Burmese courts to map their rivalries, supply lines, and hidden weaknesses. Only with careful intrigue across the mountains can we prepare the ground for Khmer influence to take root in Burma."
mnd_khm_upper_burma_title: "Invade Upper Burma"
mnd_khm_upper_burma_desc: "The kingdoms of Upper Burma sit divided and vulnerable. By marching our armies into the Irrawaddy Valley, we can bring these fractured lands under Khmer control and open the path to dominate all of Burma."
mnd_khm_burma_united_title: "Unite Burma"
mnd_khm_burma_united_desc: "The kingdoms of Burma have long been plagued by division and strife. Now, under Khmer rule, the land is united at last. With the Irrawaddy Valley secured and our authority unquestioned, we may turn Burma into a pillar of strength for our empire."
mnd_khm_push_to_yangzhe_title: "Push to the Yangtze"
mnd_khm_push_to_yangzhe_desc: "Beyond the mountains and valleys lies the great Yangtze River, heart of China’s wealth and power. To secure our place as a true empire, we must press our conquests northward, reaching the fertile plains and trade centers along its banks."
mnd_khm_control_china_trade_title: "Control Chinese Trade"
mnd_khm_control_china_trade_desc: "The riches of Cathay flow through bustling markets and along the great rivers. If Khmer merchants are to dominate Asian commerce, we must seize control of these vital trade routes and bend the wealth of China to fuel our empire."
mnd_khm_imperial_ambitions_title: "Khmer Empire"
mnd_khm_imperial_ambitions_desc: "From the jungles of Indochina to the valleys of Burma and the markets of China, our banners now fly high. The legacy of Angkor is reborn, not as a memory of the past, but as a living empire. It is time to cast aside the old kingdom and proclaim the Khmer Empire restored."

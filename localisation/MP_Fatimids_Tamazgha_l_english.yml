# TAMAZGHA

TAM: "Tamazgha"
TAM_ADJ: "Amazigh"
TAM_ADJ2: "Amazigh"
berber_maghreb_reform: "Raids of Fire"
berber_maghreb_reform_desc: "The strength of the Berbers lies in their swift horsemen, who strike across desert and mountain with unmatched speed. Loot and plunder have long sustained our tribes, and by embracing this way of war, we ensure that conquest enriches our warriors and fills our coffers. Where our horses ride, fire and spoils shall follow."
berber_nation_title: "Form Tamazgha"
berber_nation_desc: "From the rugged Atlas Mountains to the endless sands of the Sahara, the Berber tribes have endured the march of empires and the rule of foreign dynasties. Yet our spirit has never been broken. By uniting our clans under one nation, we cast off division and proclaim a state rooted in our own traditions, language, and strength. No longer fragmented, the Berbers shall stand as masters of the Maghreb and guardians of the desert."

TAM_ideas: "Tamazgha Ideas"
TAM_ideas_start: "Tamazgha Traditions"
TAM_ideas_bonus: "Tamazgha Ambition"

TAM_1: "Warriors of the Dunes"
TAM_1_desc: "From the shifting sands to the mountain passes, our warriors move with speed and endurance. Hardened by the desert and guided by clan honor, they replenish their ranks as swiftly as the wind reshapes the dunes."

TAM_2: "Riders of the Sahara"
TAM_2_desc: "Our cavalry are born in the saddle, masters of speed and shock. Through ambush, feint, and sudden charge, they embody the fury of the desert storm."

TAM_3: "Corsairs of the Coast"
TAM_3_desc: "Along the Maghrebi shores, our ships hunt as the hawks of the sea. Captains seasoned by wind and salt strike swiftly and vanish just as fast, bringing glory and spoils to Tamazgha."

TAM_4: "Masters of the Inland Sea"
TAM_4_desc: "The Mediterranean is no longer a barrier but a stage for our power. Our galleys rule the waves, swift and deadly, bearing the legacy of centuries of seafaring tribes."

TAM_5: "Guardians of the Maghrebi Shores"
TAM_5_desc: "From Ceuta to Tripoli, our coasts are safe beneath the watchful eyes of Tamazgha’s fleets. No enemy fleet may threaten our ports, for we strike first and mend our hulls upon our own waters."

TAM_6: "Traders of the Two Worlds"
TAM_6_desc: "From the gold routes of the Sahara to the bustling ports of the Mediterranean, Tamazgha stands at the crossroads of worlds. Our merchants carry spices, salt, and stories across continents."

TAM_7: "Fury of the Atlas"
TAM_7_desc: "When the clans unite under one banner, the mountains themselves seem to move. The might of Tamazgha strikes with thunderous force, breaking all who would stand against our freedom."


# FATIMIDS

FAT: "Fatimids"
FAT_ADJ: "Fatimid"
FAT_ADJ2: "Fatimid"
fatimid_maghreb_reform: "Reorganization of the Diwan"
fatimid_maghreb_reform_desc: "In the Maghreb, revenue has long been squandered by corrupt officials and uneven levies. To uphold the Fatimid Caliphate, we must impose order upon this chaos. By regulating the zakat and jizya, ensuring fair burdens on both believer and dhimmi alike, and curbing the greed of tax-farmers, we shall restore justice while securing the wealth needed to sustain our armies and the da‘wa of the Imam."
estate_dhimmi_technology_fatimids: "Fatimid Scholars and Engineers"
estate_dhimmi_technology_fatimids_desc: "The dhimmi communities of the Fatimid Caliphate—Jews, Christians, and others under our protection—possess knowledge in science, administration, and engineering that can strengthen our realm. By granting them patronage and a measure of autonomy, we may harness their talents to advance our state’s learning and technology, though some among the faithful may resent such reliance."
fatimid_nation_title: "Form the Fatimid Caliphate"
fatimid_nation_desc: "From the shores of the Maghreb, the Fatimids once rose as the rightful heirs of the Prophet’s family, establishing a mighty caliphate that stretched across North Africa and into the heart of the Middle East. By reviving their legacy, we declare ourselves not merely a kingdom, but the Caliphate itself — a beacon of Shi’a faith, a rival to Abbasid pretenders, and a power destined to rule from Cairo to the farthest frontiers of Islam."

FAT_ideas: "Fatimid Ideas"
FAT_ideas_start: "Fatimid Traditions"
FAT_ideas_bonus: "Fatimid Ambition"

FAT_1: "The House of Knowledge"
FAT_1_desc: "Under our rule, learning flourishes. Scholars from across the world gather in our halls to study the sciences, philosophy, and law. Knowledge is our greatest weapon, and ignorance our only enemy."

FAT_2: "Army of the Caliphate"
FAT_2_desc: "The Fatimid army draws strength from many peoples—Berbers, Sudanese, Turks, and Arabs—united by faith and purpose. By hiring seasoned soldiers and loyal mercenaries, we expand our reach while sparing our subjects."

FAT_3: "Treasury of Cairo"
FAT_3_desc: "From the bazaars of Fustat to the ports of Alexandria, commerce thrives under Fatimid administration. Just taxation and clever trade management fill the caliphal treasury and secure the prosperity of our cities."

FAT_4: "Banner of the Mahdi"
FAT_4_desc: "Our soldiers march under the banner of divine guidance. The faithful fight not for gold, but for the unity of the Ummah and the glory of the Caliphate. Their courage turns the tide of battle."

FAT_5: "Professionals of the Sword"
FAT_5_desc: "By reforming the system of pay and discipline, the Fatimid military becomes a model of efficiency. Mercenary forces serve the Caliphate faithfully, knowing their wages are fair and their service honored."

FAT_6: "Splendor of the Caliphate"
FAT_6_desc: "The majesty of our court rivals that of any empire. The Fatimid Caliphate stands as the beacon of civilization, adorned with scholars, poets, and administrators whose brilliance serves both faith and state."

FAT_7: "Harmony of the Faiths"
FAT_7_desc: "The Caliphate embraces diversity as a strength. Under our protection, Muslims, Christians, and Jews coexist in peace, each contributing to the prosperity of the realm. The justice of the Imams shines upon all."


ilkhanate_government_reform_desc: "Born from the thunder of Mongol conquest, the Ilkhanate forged a new style of governance — a fusion of steppe authority and Persian bureaucracy. The Khans ruled not merely as conquerors, but as heirs to ancient kings, commanding both the loyalty of the riders of the plains and the scribes of the cities. In this union of sword and pen, the Ilkhanate found its strength and legitimacy."



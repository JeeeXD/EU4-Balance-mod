restore_mandate_title: "Restore the Mandate of Heavan"
restore_mandate_desc: "The authority of the state has been broken, its institutions weakened and its legitimacy questioned. Yet order can be restored. By reasserting control over the realm, reforming administration, and securing the loyalty of the people, we may once again claim the Mandate of Heavan to rule — not as conquerors, but as rightful stewards of the land."

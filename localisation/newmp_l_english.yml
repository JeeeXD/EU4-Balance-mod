fatimid_maghreb_reform_desc: "In the Maghreb, revenue has long been squandered by corrupt officials and uneven levies. To uphold the Fatimid Caliphate, we must impose order upon this chaos. By regulating the zakat and jizya, ensuring fair burdens on both believer and dhimmi alike, and curbing the greed of tax-farmers, we shall restore justice while securing the wealth needed to sustain our armies and the da‘wa of the Imam."
estate_dhimmi_technology_fatimids: "Fatimid Scholars and Engineers"
estate_dhimmi_technology_fatimids_desc: "The dhimmi communities of the Fatimid Caliphate—Jews, Christians, and others under our protection—possess knowledge in science, administration, and engineering that can strengthen our realm. By granting them patronage and a measure of autonomy, we may harness their talents to advance our state’s learning and technology, though some among the faithful may resent such reliance."
fatimid_nation_title: "Form the Fatimid Caliphate"
fatimid_nation_desc: "From the shores of the Maghreb, the Fatimids once rose as the rightful heirs of the Prophet’s family, establishing a mighty caliphate that stretched across North Africa and into the heart of the Middle East. By reviving their legacy, we declare ourselves not merely a kingdom, but the Caliphate itself — a beacon of Shi’a faith, a rival to Abbasid pretenders, and a power destined to rule from Cairo to the farthest frontiers of Islam."



############# Tamazgha ######################

TAM: "Tamazgha"
TAM_ADJ: "Amazigh"
TAM_ADJ2: "Amazigh"
berber_maghreb_reform: "Raids of Fire"
berber_maghreb_reform_desc: "The strength of the Berbers lies in their swift horsemen, who strike across desert and mountain with unmatched speed. Loot and plunder have long sustained our tribes, and by embracing this way of war, we ensure that conquest enriches our warriors and fills our coffers. Where our horses ride, fire and spoils shall follow."
berber_nation_title: "Form Tamazgha"
berber_nation_desc: "From the rugged Atlas Mountains to the endless sands of the Sahara, the Berber tribes have endured the march of empires and the rule of foreign dynasties. Yet our spirit has never been broken. By uniting our clans under one nation, we cast off division and proclaim a state rooted in our own traditions, language, and strength. No longer fragmented, the Berbers shall stand as masters of the Maghreb and guardians of the desert."


############# North German Confed ######################

NGR: "North German Confederation"
NGR_ADJ: "German"
NGR_ADJ2: "German"
form_north_germany_title: "Form North German Confederation"
form_north_germany_desc: "The northern plains of Germany, from Saxony to the Hanseatic ports, have long been a patchwork of dukes, bishops, and free cities. By bringing these lands together, we can form a powerful North German realm—commanding the trade of the Baltic and North Sea, and standing as a counterweight to the empires of the south."
north_german_reform: "Reformation of the North"
north_german_reform_desc: "The lands of Northern Germany have long been fertile ground for religious change, from the Hanseatic cities questioning Rome’s authority to the princes embracing reformist doctrines. By harnessing this spirit of defiance and conviction, we can strengthen our state by"


############# South German Confed ######################


SGR: "South German Confederation"
SGR_ADJ: "German"
SGR_ADJ2: "German"
form_south_germany_title: "Form South German Confederation"
form_south_germany_desc: "The lands of Swabia, Bavaria, Franconia, and the Alpine passes have long stood divided, their princes vying for influence within the Holy Roman Empire. By uniting these realms under one banner, we can forge a powerful South German state, strong enough to rival both Austria and Prussia. A new chapter in German history shall begin, with our banner flying over the heart of Central Europe."
teutonic_holy_order: "Order of the Teutons"
teutonic_holy_order_desc: "The Catholic princes of the south have long relied on knightly orders to defend their faith and uphold the authority of the Church. From Bavarian castles to Swabian strongholds, these orders combined the devotion of the monk with the discipline of the soldier. By entrusting them with land and privilege, we bind our realm to the sword of Christ, standing as guardians of the old faith in an age of heresy and reform."
south_german_reform: "Order of the Teutons"
south_german_reform_desc: "The Catholic princes of the south have long sheltered holy orders within their lands, granting them castles, estates, and authority to root out heresy. By binding ourselves to these knightly institutions, we unite piety with discipline. The sword and the cross shall march together, and our enemies will know us as the heirs of the Teutonic knights and defenders of the Catholic faith."
south_german_holy_order_tooltip: "Unlock a unique §YHoly Order§! for the §YSouth German Confederation§!"



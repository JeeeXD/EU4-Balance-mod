loyal_friend_desc: "A steadfast ally who has served the crown through fortune and failure alike, always prioritizing duty over ambition."
missionary_desc: "A zealous agent of faith, tirelessly working to spread the true creed and convert the heathens."
governor_desc: "An experienced administrator who brings stability and order to the provinces under his care."
state_theorist_desc: "A brilliant mind devoted to shaping the very structure of the state through reform, reason, and philosophy."
magistrive_desc: "An expert in law and justice, ensuring that royal decrees are upheld across the realm."
chancellor_desc: "A master diplomat who manages the realm’s foreign relations and ensures the crown’s words carry weight abroad."
herald_desc: "A messenger and keeper of noble lineage, who secures recognition and prestige for the realm’s noble houses."

naval_tactician_desc: "A seasoned commander of the high seas, skilled in using wind, tide, and cunning to outmaneuver the enemy."
visionary_desc: "A forward-thinking leader whose ideas challenge convention and shape the destiny of the nation."
reformist_desc: "A pragmatic reformer determined to change outdated institutions and bring progress to the realm."
overseer_desc: "A diligent administrator who ensures that every aspect of government and infrastructure runs efficiently."
jester_desc: "A sharp-witted entertainer who brings humor to the court, but whose words often conceal keen political insight."
harbor_master_desc: "An expert in maritime logistics who ensures that every ship, dock, and sailor contributes to the realm’s prosperity."
customs_officer_desc: "A vigilant enforcer of tariffs and trade laws, ensuring that no coin passes without the crown’s share."
imperial_councilor_desc: "An advisor well-versed in the politics of the Empire, who works to expand and preserve its influence."
imperial_bureaucrat_desc: "A tireless administrator dedicated to maintaining order and efficiency across the vast imperial institutions."

landsknecht_desc: "A hardened mercenary leader commanding seasoned soldiers of fortune, loyal as long as the pay remains steady."
dragoon_desc: "A commander of mobile cavalry, skilled in both mounted and dismounted combat across the ever-changing battlefield."
howitzer_desc: "An expert in artillery warfare, whose mastery of gunpowder and precision keeps the enemy’s fortresses in ruins."
tactician_desc: "A master strategist who sees the battlefield as a chessboard, always anticipating the enemy’s next move."
drill_master_desc: "A relentless trainer who transforms raw recruits into a disciplined and battle-ready army."
siege_engineer_desc: "A genius in siegecraft who designs engines of war to breach even the strongest fortifications."
contractor_desc: "A shrewd organizer of armies and supply lines, ensuring that soldiers and mercenaries alike are well-equipped and well-paid."


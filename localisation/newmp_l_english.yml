l_english:

####### Advisors #########

advisor_event.1.t: "$LOYAL_FRIEND$"
advisor_event.1.d: "Few men are as dependable as $LOYAL_FRIEND$. Through triumph and turmoil alike, [Root.Adm_Advisor.GetSheHe] has remained at [Root.Monarch.GetTitle]'s side, offering counsel without ambition and loyalty without condition. In times of doubt, it is comforting to know that such friendship endures."

advisor_event.2.t: "$MISSIONARY$"
advisor_event.2.d: "$MISSIONARY$ has become the spiritual heart of our realm, inspiring both fear and devotion in equal measure. With sermons blazing like fire, [Root.Adm_Advisor.GetSheHe] calls upon the faithful to root out heresy and spread the one true faith to the corners of the earth."

advisor_event.3.t: "$GOVERNOR$"
advisor_event.3.d: "Under the steady hand of $GOVERNOR$, our provinces have flourished. Taxes arrive on time, roads are well kept, and the peasants praise [Root.Adm_Advisor.GetHerHis] fairness. It seems not all good governance requires the lash."

advisor_event.4.t: "$STATE_THEORIST$"
advisor_event.4.d: "Philosophers speak of ideals, but $STATE_THEORIST$ dares to shape them into law. With vision and reason, [Root.Adm_Advisor.GetSheHe] weaves the threads of statecraft into a system both stable and strong — a design that may outlast its maker."

advisor_event.5.t: "$MAGISTRATE$"
advisor_event.5.d: "$MAGISTRATE$ has become synonymous with justice throughout the land. Whether settling disputes or enforcing decrees, [Root.Adm_Advisor.GetSheHe] upholds the law without fear or favor, earning both respect and resentment in equal measure."

advisor_event.6.t: "$CHANCELLOR$"
advisor_event.6.d: "Diplomacy is an art, and $CHANCELLOR$ is its master. Through tact, wit, and persistence, [Root.Adm_Advisor.GetSheHe] has turned foes into allies and rivals into trading partners. Few can deny [Root.Adm_Advisor.GetHerHis] influence at court."

advisor_event.7.t: "$HERALD$"
advisor_event.7.d: "The banners of our realm are known far and wide, thanks to the tireless efforts of $HERALD$. [Root.Adm_Advisor.GetSheHeCap] ensures our prestige shines brighter than that of our rivals, securing our name in the chronicles of Europe."

advisor_event.8.t: "$NAVAL_TACTICIAN$"
advisor_event.8.d: "The sea obeys no man, yet $NAVAL_TACTICIAN$ comes close. Through clever maneuvers and a deep understanding of wind and tide, [Root.Adm_Advisor.GetSheHe] has turned uncertain battles into decisive victories."

advisor_event.9.t: "$VISIONARY$"
advisor_event.9.d: "$VISIONARY$ sees not the world as it is, but as it could be. [Root.Adm_Advisor.GetSheHeCap] challenges old truths and stirs the court with new ideas, daring us to imagine a future greater than the past."

advisor_event.10.t: "$REFORMIST$"
advisor_event.10.d: "Where others see tradition, $REFORMIST$ sees inefficiency. [Root.Adm_Advisor.GetSheHeCap] has made it [Root.Adm_Advisor.GetHerHis] mission to reshape the realm’s institutions, often to the frustration of the old guard."

advisor_event.11.t: "$OVERSEER$"
advisor_event.11.d: "No task escapes the notice of $OVERSEER$. [Root.Adm_Advisor.GetSheHeCap] demands excellence in all things — from the treasury to the workshops — and ensures that every hand in the realm serves a purpose."

advisor_event.12.t: "$JESTER$"
advisor_event.12.d: "Though dismissed by some as a fool, $JESTER$ possesses a wit sharper than most courtiers’ swords. Beneath the laughter lies keen observation, and more than once [Root.Adm_Advisor.GetSheHe] has spoken truths none dared to utter."

advisor_event.13.t: "$HARBOR_MASTER$"
advisor_event.13.d: "With a sailor’s instinct and a merchant’s mind, $HARBOR_MASTER$ has transformed our ports into bustling centers of trade. Under [Root.Adm_Advisor.GetHerHis] guidance, the docks never sleep and the ships never wait."

advisor_event.14.t: "$CUSTOMS_OFFICER$"
advisor_event.14.d: "$CUSTOMS_OFFICER$ has filled the coffers where others saw only corruption. [Root.Adm_Advisor.GetSheHeCap] has brought order to the trade routes and ensured that the crown’s tariffs are collected to the last coin."

advisor_event.15.t: "$IMPERIAL_COUNCILOR$"
advisor_event.15.d: "In the labyrinth of imperial politics, $IMPERIAL_COUNCILOR$ is our guide. [Root.Adm_Advisor.GetSheHeCap] knows every prince, elector, and envoy — and how best to sway them to our cause."

advisor_event.16.t: "$IMPERIAL_BUREAUCRAT$"
advisor_event.16.d: "Few understand the vast machinery of empire as well as $IMPERIAL_BUREAUCRAT$. Through tireless effort and unyielding discipline, [Root.Adm_Advisor.GetSheHe] keeps the imperial administration running with clockwork precision."

advisor_event.17.t: "$LANDSKNECHT$"
advisor_event.17.d: "The clatter of pikes and drums heralds $LANDSKNECHT$’s arrival. A veteran of countless campaigns, [Root.Adm_Advisor.GetSheHe] commands respect among the mercenaries and fear among our enemies."

advisor_event.18.t: "$DRAGOON$"
advisor_event.18.d: "$DRAGOON$ embodies the spirit of mobility and precision. Whether charging across the plains or dismounting to hold a line, [Root.Adm_Advisor.GetSheHe] brings a discipline that inspires the troops to follow without hesitation."

advisor_event.19.t: "$HOWITZER$"
advisor_event.19.d: "Thunder roars and earth trembles where $HOWITZER$ directs [Root.Adm_Advisor.GetHerHis] guns. With careful calculations and nerves of steel, [Root.Adm_Advisor.GetSheHe] has made artillery the true king of the battlefield."

advisor_event.20.t: "$TACTICIAN$"
advisor_event.20.d: "$TACTICIAN$ approaches war as a game of wit and foresight. [Root.Adm_Advisor.GetSheHeCap] studies every campaign, every maneuver, turning experience into mastery and defeat into lesson."

advisor_event.21.t: "$DRILL_MASTER$"
advisor_event.21.d: "The soldiers curse $DRILL_MASTER$ by name, yet none deny the results. Through unrelenting discipline, [Root.Adm_Advisor.GetSheHe] has forged our army into an instrument of precision and obedience."

advisor_event.22.t: "$SIEGE_ENGINEER$"
advisor_event.22.d: "No wall can stand forever against $SIEGE_ENGINEER$. [Root.Adm_Advisor.GetSheHeCap] studies fortifications with a patient mind and a ruthless practicality, breaking stones and spirits alike."

advisor_event.23.t: "$CONTRACTOR$"
advisor_event.23.d: "$CONTRACTOR$ has turned the art of war into a business. [Root.Adm_Advisor.GetSheHeCap] knows every route of supply, every price of powder, and ensures that no soldier marches without pay or provisions."



############### MISSIONS ###########
mer_baluchistan_frontier_title: "Baluchistan Frontier"
mer_baluchistan_frontier_desc: "Beyond the Thar and the Indus lies the rugged land of Baluchistan. If Mewar is to stand as a true power on the western frontier, we must tame these harsh lands and bring their warriors and trade routes under our banner."
mer_defense_against_persia_title: "Defense Against Persia"
mer_defense_against_persia_desc: "The Persian powers to the west may one day cast their gaze upon India. To safeguard our people and lands, we must fortify our frontiers, discipline our armies, and be ready to repel any invasion that crosses the mountains or deserts."
mer_mewar_triumphant_title: "Mewar Triumphant"
mer_mewar_triumphant_desc: "Through valor, sacrifice, and unyielding resolve, Mewar has overcome every foe and rival. From the deserts of Rajasthan to the farthest frontiers, our banners now fly proudly. The Rajput spirit stands eternal, and Mewar’s triumph shall echo across all of India."
mer_the_indus_title: "The Indus"
mer_the_indus_desc: "The mighty Indus River has long been the lifeline of trade and power in the northwest. By securing its fertile valleys and strategic crossings, Mewar will command the wealth of caravans and the loyalty of the peoples who dwell along its banks."
mer_up_the_indus_title: "Up the Indus"
mer_up_the_indus_desc: "Having secured the lower reaches of the river, we must now march upstream into the heartlands of the Indus. Control of these fertile valleys and bustling towns will cement our dominance over the northwest and open the road toward the mountains beyond."
mer_take_kashmir_title: "Take Kashmir"
mer_take_kashmir_desc: "The valleys of Kashmir are famed for their beauty and wealth, yet they also command the passes into Central Asia. By bringing Kashmir under our rule, we will not only enrich our realm but also secure a strategic stronghold at the roof of India."
mer_into_gujarat_title: "Into Gujarat"
mer_into_gujarat_desc: "The riches of Gujarat flow from its fertile lands and bustling ports. By extending our rule into this region, we can secure new sources of wealth, command vital trade routes, and bring the western coast firmly under Rajput dominion."
mer_gujarat_peninsula_title: "Gujarat Peninsula"
mer_gujarat_peninsula_desc: "The Kathiawar peninsula is a hub of commerce, its ports drawing merchants from Arabia, Persia, and beyond. By bringing these lands under our control, Mewar will command the flow of trade along India’s western coast and secure unrivaled influence over the Arabian Sea."
mer_the_three_rivers_title: "The Three Rivers"
mer_the_three_rivers_desc: "The Indus, the Ganges, and the Yamuna are the lifeblood of India, nourishing its people and sustaining its great cities. To hold these three rivers is to command the heart of the subcontinent itself, and to fulfill Mewar’s destiny as master of Hindustan."
mer_build_barracks_title: "Halls of the Rajputs"
mer_build_barracks_desc: "The valor of our Rajput warriors must be matched with proper training and organization. By constructing halls and barracks throughout our realm, we will ensure a steady supply of disciplined soldiers, ready to defend Mewar and expand her dominion."
mer_build_forcelimit_buildings_title: "Armories of Mewar"
mer_build_forcelimit_buildings_desc: "To sustain ever larger armies, our realm must be equipped with the infrastructure to arm, supply, and muster men in every corner. By establishing great armories and mustering halls, Mewar will stand ready to field forces worthy of an empire."
mer_control_iron_title: "Masters of Iron"
mer_control_iron_desc: "Iron is the lifeblood of any army, the metal from which swords, spears, and armor are forged. By securing the mines and trade of this precious resource, we will ensure that Mewar’s warriors never march unarmed, and that our enemies tremble before Rajput steel."
mer_manufacture_artillery_title: "Guns of Mewar"
mer_manufacture_artillery_desc: "The thunder of cannons now decides battles as much as the sword and lance. By investing in foundries and workshops to produce our own artillery, we shall ensure that Mewar’s armies march with the roar of gunpowder at their side, breaking walls and enemies alike."
mer_ahead_time_title: "Imported Technology"
mer_ahead_time_desc: "To survive among rival sultanates and empires, we must not merely match their weapons, but surpass them. By ensuring Mewar stays at the forefront of military innovation, our soldiers will always wield the sharpest edge and the most advanced arms on the battlefield."
mer_build_up_units_title: "Raise the Rajput Hosts"
mer_build_up_units_desc: "The strength of Mewar lies in its warriors. By calling upon every clan and mustering hall, we can raise great hosts of Rajput soldiers, swelling our ranks until our armies march as an unstoppable force across India."
mer_iron_storage_title: "Stores of Steel"
mer_iron_storage_desc: "Iron is useless if it cannot be stored, forged, and distributed to our warriors when needed. By building secure stockpiles and smithies, we shall ensure Mewar never runs short of the steel that arms our Rajputs."
mer_control_livestock_title: "Command the Herds"
mer_control_livestock_desc: "Horses, oxen, and camels are the lifeblood of our armies, pulling supply carts, carrying warriors, and feeding our people. By controlling the herds of Rajasthan, we secure the strength of our cavalry and the endurance of Mewar’s hosts."
mer_rajput_units_title: "Rajput Battalions"
mer_rajput_units_desc: "The Rajputs are the very soul of our armies, their valor unmatched and their loyalty unshaken. By formalizing their service into dedicated battalions, we shall create an elite corps that will carry Mewar’s banners to victory across India."
mer_gujarat_trade_title: "Wealth of Gujarat"
mer_gujarat_trade_desc: "The markets of Gujarat draw merchants from Arabia, Persia, and Hindustan alike. By bringing these ports and caravan routes under our influence, Mewar shall command the wealth of the western seas and turn Gujarat’s riches into the lifeblood of our empire."
mer_fairs_title: "Rajasthani Fairs"
mer_fairs_desc: "From camel fairs to caravan markets, the great gatherings of Rajasthan bring together traders, herders, and artisans from across the land. By encouraging and protecting these fairs, we can enrich Mewar’s coffers and make our realm the beating heart of desert commerce."
mer_trade_supremacy_title: "Trade Supremacy"
mer_trade_supremacy_desc: "From the markets of Gujarat to the caravan routes of Rajasthan, our merchants now dominate the flow of goods across the western seas and the heart of India. With wealth pouring into our coffers, Mewar stands supreme in trade as well as in war."
mer_silk_trade_title: "Silk Trade"
mer_silk_trade_desc: "Silk is the fabric of kings and emperors, coveted in every court from Delhi to Persia and beyond. By seizing control of the silk trade routes and weaving centers, Mewar will not only grow richer, but also clothe its rule in unrivaled splendor."
mer_trade_landing_title: "Secure Coastal Ports"
mer_trade_landing_desc: "To command the seas of the west, we must first seize firm footholds along the coast. By securing key harbors and trade landings, Mewar will open the gates of oceanic commerce and extend our reach far beyond Rajasthan."
mer_gold_production_title: "Golden Wealth"
mer_gold_production_desc: "Gold is the foundation of prosperity and power. By developing mines and ensuring secure transport of their riches, Mewar shall fill its treasuries with untold wealth, funding both our armies and the splendor of our court."
mer_new_gold_production_title: "Mines of Bhliwara"
mer_new_gold_production_desc: "Fresh seams of gold have been uncovered in our lands, promising wealth beyond measure. By investing in miners, workshops, and safe trade routes, Mewar will ensure these riches flow steadily into our coffers and strengthen our dominion."
mer_building_country_title: "Pillars of the Realm"
mer_building_country_desc: "From temples and markets to forts and workshops, the strength of a kingdom rests on the foundations it builds. By expanding our infrastructure across the land, Mewar will rise as a realm of prosperity and enduring power."
mer_stable_country_title: "A Stable Country"
mer_stable_country_desc: "No empire can endure if torn apart by strife and rebellion. By strengthening our administration, easing the burdens on our people, and upholding justice, we will ensure that Mewar stands united and unshaken in the face of any challenge."
mer_brahmins_loyalty_title: "Favour of the Brahmins"
mer_brahmins_loyalty_desc: "The Brahmins hold great sway over matters of faith and learning. By granting them patronage and listening to their counsel, we secure not only their loyalty but also the spiritual legitimacy that strengthens our rule."
mer_manufactories_haven_title: "Haven of Manufactories"
mer_manufactories_haven_desc: "From textiles to arms, our lands bustle with production. By encouraging the growth of manufactories, we turn Mewar into a center of industry where wealth and innovation flourish."
mer_rajput_disciplined_title: "Disciplined Rajputs"
mer_rajput_disciplined_desc: "The Rajputs are famed for their courage, yet courage alone does not win wars. By instilling strict discipline and drilling our warriors in the arts of organized warfare, we shall forge an army that fights not only with valor, but with unmatched order and precision."
mer_rajput_lands_title: "The Rajput Lands"
mer_rajput_lands_desc: "Our forefathers carved their homes out of the rugged hills and deserts of Rajputana. To secure our legacy, we must bring these lands fully under our banner, uniting the scattered Rajput states and restoring the glory of our people."

